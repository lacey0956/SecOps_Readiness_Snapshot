<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Operations Readiness Snapshot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        
        body {
            /* 統一字體為 Raleway，中文備援 Noto Sans TC */
            font-family: 'Raleway', 'Noto Sans TC', sans-serif;
            background-color: #050505;
            color: #ffffff;
            background-image: radial-gradient(circle at 90% 10%, rgba(66, 133, 244, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 10% 90%, rgba(251, 188, 5, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 移除所有斜體設定 */
        * {
            font-style: normal !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
        }

        .option-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(6px);
        }

        .option-card.selected {
            background: rgba(66, 133, 244, 0.12);
            border-color: #4285F4;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.15);
        }

        .btn-primary {
            background: linear-gradient(90deg, #4285F4, #34A853);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4285F4, #34A853);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .level-badge {
            font-size: 0.8rem;
            padding: 0.4rem 1.2rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot-l1 { background-color: #34A853; box-shadow: 0 0 10px #34A853; }
        .dot-l2 { background-color: #FBBC04; box-shadow: 0 0 10px #FBBC04; }
        .dot-l3 { background-color: #EA4335; box-shadow: 0 0 12px #EA4335; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .result-text-block {
            line-height: 1.9;
            white-space: pre-line;
            color: #e5e7eb;
            font-weight: 400;
        }

        .app-max-width {
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="app-max-width">
        <!-- Header -->
        <header class="mb-12 space-y-6">
            <div class="flex justify-between items-start">
                <img src="Header.png" alt="Logo" class="h-10 md:h-12 w-auto object-contain">
                <button onclick="toggleLanguage()" class="text-[10px] font-bold text-gray-500 hover:text-white border border-white/10 rounded-full px-4 py-2 bg-white/5 transition-all" id="lang-btn">
                    EN / 繁中
                </button>
            </div>
            <div class="pt-6 border-t border-white/10">
                <h1 class="text-xs md:text-sm font-black tracking-[0.3em] text-gray-500 uppercase" id="nav-title">
                    Security Operations Readiness Snapshot
                </h1>
            </div>
        </header>

        <main id="app-container">
            <!-- Setup Section -->
            <section id="setup-section" class="glass-card p-10 md:p-16 text-center">
                <h2 class="text-3xl md:text-4xl font-black mb-4 tracking-tight" id="home-title">資安營運成熟度診斷</h2>
                <p class="text-gray-500 mb-12 text-sm font-medium" id="home-subtitle">請輸入基本資訊以啟動盤點 (約需 10 - 15 分鐘)</p>
                
                <div class="max-w-sm mx-auto space-y-6 text-left">
                    <div>
                        <label class="block text-[10px] font-black text-gray-600 mb-3 uppercase tracking-[0.2em]" id="label-client">客戶公司名稱</label>
                        <input type="text" id="client-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-blue-500 text-white transition-all" placeholder="例如：思想科技">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-600 mb-3 uppercase tracking-[0.2em]" id="label-sales">負責業務姓名</label>
                        <input type="text" id="sales-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-blue-500 text-white transition-all" placeholder="Lacey">
                    </div>
                    <button onclick="startDiagnostic()" class="w-full btn-primary mt-8 py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-500/10" id="btn-start">進入診斷問卷</button>
                </div>
            </section>

            <!-- Diagnostic Section -->
            <section id="diagnostic-section" class="hidden glass-card p-8 md:p-16">
                <div class="flex justify-between items-end mb-10">
                    <div class="space-y-2">
                        <span id="question-category" class="text-blue-400 font-black text-[10px] tracking-[0.3em] uppercase">Category</span>
                        <h2 id="question-title" class="text-2xl md:text-3xl font-bold leading-tight">Question Title</h2>
                    </div>
                    <div class="text-right">
                        <span class="text-gray-600 text-xs font-mono font-bold"><span id="current-step">1</span> / 8</span>
                    </div>
                </div>
                
                <div class="h-1 w-full bg-white/5 rounded-full mb-14 overflow-hidden">
                    <div id="progress-fill" class="progress-fill" style="width: 12.5%;"></div>
                </div>

                <div id="options-container" class="space-y-4"></div>

                <div class="flex justify-between items-center mt-14">
                    <button id="prev-btn" onclick="prevQuestion()" class="text-[10px] font-black tracking-widest text-gray-600 hover:text-white transition-colors invisible">← PREV</button>
                    <button id="next-btn" onclick="nextQuestion()" class="px-12 py-4 bg-white/10 rounded-full font-black hover:bg-white/20 transition-all disabled:opacity-10 text-xs tracking-widest" disabled>NEXT</button>
                </div>
            </section>

            <!-- Result Section -->
            <section id="result-section" class="hidden space-y-8">
                <div class="glass-card p-10 md:p-16">
                    <div id="result-badge" class="level-badge">
                        <span id="badge-dot" class="dot"></span>
                        <span id="badge-text">LEVEL</span>
                    </div>
                    
                    <h2 id="result-status-title" class="text-4xl md:text-6xl font-black mb-12 tracking-tighter text-white">Result Title</h2>
                    
                    <div class="space-y-16">
                        <!-- Summary -->
                        <div class="relative pl-10 border-l-2 border-white/5">
                            <h3 class="text-blue-500 font-black mb-6 text-xs uppercase tracking-[0.4em]" id="txt-summary-title">現況盤點摘要</h3>
                            <div id="result-description" class="result-text-block text-base md:text-lg"></div>
                        </div>

                        <!-- Next Actions -->
                        <div class="relative pl-10 border-l-2 border-white/5">
                            <h3 class="text-green-500 font-black mb-6 text-xs uppercase tracking-[0.4em]" id="txt-next-title">建議下一步行動</h3>
                            <div id="result-next-actions" class="result-text-block text-base md:text-lg text-gray-400"></div>
                        </div>
                    </div>
                </div>

                <!-- CRM Log -->
                <div class="glass-card bg-white/[0.01] border-white/5">
                    <button onclick="toggleCRM()" class="w-full flex justify-between items-center p-6 text-gray-600 hover:text-gray-400 transition-colors">
                        <span class="text-[10px] font-black tracking-[0.2em] flex items-center gap-3" id="txt-crm-label">CRM 記錄摘要 (INTERNAL USE)</span>
                        <svg id="crm-chevron" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="crm-content" class="hidden p-8 pt-0">
                        <textarea id="crm-text" readonly class="w-full h-56 bg-black/40 border border-white/5 rounded-2xl p-6 text-[10px] font-mono text-gray-500 focus:outline-none leading-relaxed"></textarea>
                        <button onclick="copyCRM()" class="mt-6 px-8 py-3 bg-white/5 text-[10px] font-black tracking-widest border border-white/10 rounded-full hover:bg-white/10 transition uppercase" id="btn-copy">複製內容</button>
                    </div>
                </div>

                <div class="text-center py-12">
                    <button onclick="location.reload()" class="inline-flex items-center gap-4 px-12 py-5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-white font-black transition-all hover:scale-105">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span id="btn-restart">重新開始新診斷</span>
                    </button>
                </div>
            </section>
        </main>

        <footer class="mt-16 text-center text-gray-800 text-[10px] font-bold tracking-[0.4em] uppercase pb-20">
            &copy; 2026 Master Concept | Google Cloud Premier Partner
        </footer>
    </div>

    <script>
        const translations = {
            zh: {
                navTitle: "Security Operations Readiness Snapshot",
                homeTitle: "資安營運成熟度診斷",
                homeSubtitle: "請輸入基本資訊以啟動盤點 (約需 10 - 15 分鐘)",
                labelClient: "客戶公司名稱",
                labelSales: "負責業務姓名",
                placeholderClient: "例如：思想科技",
                placeholderSales: "Lacey",
                btnStart: "進入診斷問卷",
                btnNext: "下一步",
                btnFinish: "查看診斷結果",
                btnPrev: "← 上一步",
                txtSummaryTitle: "現況盤點摘要",
                txtNextTitle: "建議下一步行動",
                txtCrmLabel: "CRM 記錄摘要 (INTERNAL USE)",
                btnCopy: "複製內容",
                btnRestart: "重新開始新診斷",
                copySuccess: "已複製到剪貼簿",
                alertClient: "請輸入客戶公司名稱以繼續",
                questions: [
                    { category: "1. 日誌與可視性 (Visibility)", title: "目前企業內部的安全日誌如何存放與管理？", options: ["日誌分散在各設備，需要時才人工查詢", "有集中 Log Server，但缺乏跨系統關聯分析", "有集中平台，可關聯大部分資料來源"] },
                    { category: "2. 告警處理 (Triage)", title: "團隊每天如何處理來自不同資安設備的告警？", options: ["告警過多，人工篩選，容易疲勞", "有基本優先排序，但仍需大量人工判斷", "有明確分級機制與部分自動化"] },
                    { category: "3. 威脅情境 (Context)", title: "當發現異常 IP 或 Domain 時，目前的調查流程為何？", options: ["需要人工查 IP/Domain 是否惡意", "有訂閱情資，但未自動比對內部告警", "情資可自動整合並標示風險等級"] },
                    { category: "4. 調查流程 (Investigation)", title: "完成一個安全事件的完整調查平均需時多久？", options: ["需切換多個系統，耗時數小時", "有部分工具整合，但缺乏完整攻擊鏈", "可在單一介面查看大部分關聯資訊"] },
                    { category: "5. 回應機制 (Response)", title: "確認威脅後，採取隔離或阻斷動作的標準程序？", options: ["完全依賴人工手動處理", "有 SOP，但仍仰賴資深人員判斷", "部分常見情境已有自動化劇本"] },
                    { category: "6. 團隊負擔 (Workload)", title: "負責資安監控與回應的人員目前的工作負荷？", options: ["團隊已接近飽和，只能處理急件", "有專人處理但時間有限", "有餘裕進行主動式威脅獵捕"] },
                    { category: "7. 跨端整合 (Integration)", title: "端點、網路與雲端日誌之間的整合程度？", options: ["工具各自為政，缺乏橫向連動", "部分整合但仍有監控盲區", "大部分事件可跨領域關聯"] },
                    { category: "8. 攻擊準備度 (Readiness)", title: "若發生重大勒索病毒攻擊，團隊對早期阻斷的信心？", options: ["發生攻擊可能需數天才能恢復", "有備份，但對偵測速度沒信心", "有能力在早期阻斷大部分攻擊"] }
                ],
                results: {
                    L1: { 
                        badge: "LEVEL 1", 
                        title: "Structured but Expandable", 
                        description: "從盤點結果來看，您目前的日誌管理、告警處理與調查流程已具備基礎穩定度，整體營運架構並未出現明顯瓶頸。\n\n這代表您的團隊在日常營運層面具備良好防守能力。在當前威脅環境下，重點將轉向如何從「被動防禦」轉為「主動獵捕」，強化跨領域的可視性。", 
                        next: "• 分享最新產業攻擊趨勢與對應案例\n• 討論如何將現有基礎進化為更主動的防禦體系" 
                    },
                    L2: { 
                        badge: "LEVEL 2", 
                        title: "Operational Friction", 
                        description: "目前營運模式顯示存在部分「營運摩擦力」：\n• 調查流程存在頻繁的跨系統切換，導致耗時過長\n• 告警情境需大量人工補強，IT 團隊承擔一定壓力\n\n這代表您已具備工具基礎，但尚未完全釋放整合效益。提升「可視性 + 情境關聯」能顯著降低人力成本並縮短 MTTR。", 
                        next: "• 安排 Threat Assessment Workshop，找出高價值的優化場景\n• 評估 Google SecOps 如何整合現有工具，減少人工切換成本" 
                    },
                    L3: { 
                        badge: "LEVEL 3", 
                        title: "Operational Risk Threshold", 
                        description: "目前營運負荷處於較高位：\n• 營運複雜度高，跨平台調查極度耗時\n• 人工調查與回應成本明顯，情境整合需求迫切\n\n這類企業若持續依賴人工流程，長期將面臨擴展性與回應速度瓶頸。導入自動化劇本與情資整合，往往能在短期內顯著改善告警處理效率與早期阻斷能力。", 
                        next: "• 建議啟動 PoC 實測，驗證 SecOps 自動化劇本對調查時間的縮減幅度\n• 評估 Google Threat Intelligence (GTI) 整合後對威脅獵捕的可行性" 
                    }
                }
            },
            en: {
                navTitle: "Security Operations Readiness Snapshot",
                homeTitle: "SecOps Readiness Assessment",
                homeSubtitle: "Provide basic info to start the assessment (Est. 10 - 15 min)",
                labelClient: "Client Company Name",
                labelSales: "Sales Representative",
                placeholderClient: "e.g., Master Concept",
                placeholderSales: "Lacey",
                btnStart: "Start",
                btnNext: "Next Step",
                btnFinish: "View Results",
                btnPrev: "← Back",
                txtSummaryTitle: "Assessment Summary",
                txtNextTitle: "Recommended Next Steps",
                txtCrmLabel: "CRM LOG SUMMARY (INTERNAL USE)",
                btnCopy: "Copy Log",
                btnRestart: "Restart Assessment",
                copySuccess: "Copied to Clipboard",
                alertClient: "Please enter client name to proceed",
                questions: [
                    { category: "1. LOG VISIBILITY", title: "How are security logs currently managed?", options: ["Siloed, manual retrieval required", "Centralized, but limited cross-system correlation", "Integrated with broad visibility"] },
                    { category: "2. ALERT TRIAGE", title: "How does the team handle alerts from multiple tools?", options: ["Overwhelming; mostly manual triage", "Prioritized but heavy on manual judgment", "Classified with partial automation"] },
                    { category: "3. CONTEXTUAL INTELLIGENCE", title: "What is the process when a suspicious indicator is found?", options: ["Manual validation required", "Intelligence exists but not correlated", "Integrated with automated risk tagging"] },
                    { category: "4. INVESTIGATION WORKFLOW", title: "How long does a full attack investigation take?", options: ["Hours; involves console switching", "Tools exist but lack full attack-chain", "Consolidated interface for all context"] },
                    { category: "5. RESPONSE MECHANISM", title: "What is the process once a threat is confirmed?", options: ["Entirely manual containment", "SOP-based but relies on seniors", "Automated playbooks for common scenarios"] },
                    { category: "6. TEAM WORKLOAD", title: "What is the current workload of the SecOps team?", options: ["Operating at or near full capacity", "Dedicated staff but limited time", "Bandwidth for proactive hunting"] },
                    { category: "7. CROSS-DOMAIN INTEGRATION", title: "Integration level of endpoint, network, and cloud?", options: ["Tools operate in silos", "Partial integration; gaps remain", "Correlated across most domains"] },
                    { category: "8. ATTACK READINESS", title: "Confidence in containing a major attack early?", options: ["Recovery would take days", "Backups exist but detection is slow", "Confident in early-stage containment"] }
                ],
                results: {
                    L1: { badge: "LEVEL 1", title: "Structured but Expandable", description: "Your current foundation is structured and stable.\nLog visibility and basic alert handling are in place.\n\nThe priority is now shifting from reactive defense to proactive hunting and enhancing cross-domain visibility.", next: "• Share industry-specific threat trends and case studies.\n• Discuss how to evolve your baseline into a proactive hunting model." },
                    L2: { badge: "LEVEL 2", title: "Operational Friction", description: "Operational friction is impacting efficiency:\n• Heavy tool-switching slows down investigations.\n• Context gaps put pressure on the IT team.\n\nScaling context and visibility will yield high ROI by reducing manual analyst effort.", next: "• Schedule a Threat Assessment Workshop to identify high-value use cases.\n• Evaluate how Google SecOps can consolidate workflows to reduce MTTR." },
                    L3: { badge: "LEVEL 3", title: "Automation Imperative", description: "Your SecOps is likely operating near the risk threshold:\n• High complexity makes investigations manually intensive.\n• Automation is needed to prevent analyst burnout.\n\nImmediate integration of automated playbooks and GTI will restore operational resilience.", next: "• Initiate a PoC to validate the reduction in investigation time.\n• Evaluate GTI integration for automated enrichment and threat hunting." }
                }
            }
        };

        let currentLang = 'zh';
        let currentStep = 0;
        let answers = [];
        let clientInfo = { name: "", sales: "" };

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateUI();
            if (!document.getElementById('diagnostic-section').classList.contains('hidden')) renderQuestion();
            if (!document.getElementById('result-section').classList.contains('hidden')) calculateResult();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('lang-btn').innerText = currentLang === 'zh' ? 'EN / 繁中' : '繁中 / EN';
            document.getElementById('nav-title').innerText = t.navTitle;
            document.getElementById('home-title').innerText = t.homeTitle;
            document.getElementById('home-subtitle').innerText = t.homeSubtitle;
            document.getElementById('label-client').innerText = t.labelClient;
            document.getElementById('label-sales').innerText = t.labelSales;
            document.getElementById('client-name').placeholder = t.placeholderClient;
            document.getElementById('sales-name').placeholder = t.placeholderSales;
            document.getElementById('btn-start').innerText = t.btnStart;
            document.getElementById('txt-summary-title').innerText = t.txtSummaryTitle;
            document.getElementById('txt-next-title').innerText = t.txtNextTitle;
            document.getElementById('txt-crm-label').innerText = t.txtCrmLabel;
            document.getElementById('btn-copy').innerText = t.btnCopy;
            document.getElementById('btn-restart').innerText = t.btnRestart;
        }

        function startDiagnostic() {
            const name = document.getElementById('client-name').value;
            if (!name) { alert(translations[currentLang].alertClient); return; }
            clientInfo.name = name;
            clientInfo.sales = document.getElementById('sales-name').value || "N/A";
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('diagnostic-section').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const t = translations[currentLang];
            const q = t.questions[currentStep];
            document.getElementById('question-category').innerText = q.category;
            document.getElementById('question-title').innerText = q.title;
            document.getElementById('current-step').innerText = currentStep + 1;
            document.getElementById('progress-fill').style.width = `${((currentStep + 1) / 8) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = `option-card p-6 rounded-2xl border border-white/10 text-sm md:text-base font-medium ${answers[currentStep]?.index === idx ? 'selected' : ''}`;
                div.innerHTML = `<span>${opt}</span>`;
                div.onclick = () => { answers[currentStep] = { index: idx, score: 2 - idx }; renderQuestion(); };
                container.appendChild(div);
            });

            document.getElementById('next-btn').disabled = answers[currentStep] === undefined;
            document.getElementById('prev-btn').classList.toggle('invisible', currentStep === 0);
            document.getElementById('next-btn').innerText = currentStep === 7 ? t.btnFinish : t.btnNext;
        }

        function nextQuestion() {
            if (currentStep < 7) { currentStep++; renderQuestion(); }
            else calculateResult();
        }

        function prevQuestion() { if (currentStep > 0) { currentStep--; renderQuestion(); } }

        function calculateResult() {
            const t = translations[currentLang];
            const totalScore = answers.reduce((sum, a) => sum + a.score, 8);
            const levelKey = totalScore >= 19 ? "L3" : (totalScore >= 14 ? "L2" : "L1");
            const data = t.results[levelKey];
            
            document.getElementById('diagnostic-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            
            document.getElementById('badge-text').innerText = data.badge;
            document.getElementById('badge-dot').className = `dot dot-${levelKey.toLowerCase()}`;
            document.getElementById('result-badge').style.color = levelKey === "L1" ? "#34A853" : (levelKey === "L2" ? "#FBBC04" : "#EA4335");
            
            document.getElementById('result-status-title').innerText = data.title;
            document.getElementById('result-description').innerText = data.description;
            document.getElementById('result-next-actions').innerText = data.next;

            // CRM Log Generation
            let log = `【SECURITY OPERATIONS READINESS SNAPSHOT】\nCLIENT: ${clientInfo.name}\nSALES: ${clientInfo.sales}\nDATE: ${new Date().toLocaleDateString()}\n------------------\nLEVEL: ${data.badge} - ${data.title}\n------------------\n`;
            t.questions.forEach((q, i) => { log += `${i+1}. ${q.options[answers[i].index]}\n`; });
            document.getElementById('crm-text').value = log;
        }

        function toggleCRM() {
            const content = document.getElementById('crm-content');
            const chevron = document.getElementById('crm-chevron');
            content.classList.toggle('hidden');
            chevron.style.transform = content.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function copyCRM() {
            const txt = document.getElementById('crm-text');
            txt.select();
            document.execCommand('copy');
            const btn = document.getElementById('btn-copy');
            const oldText = btn.innerText;
            btn.innerText = translations[currentLang].copySuccess;
            setTimeout(() => { btn.innerText = oldText; }, 2000);
        }

        updateUI();
    </script>
</body>
</html>
